name: Sentinel Market Scraper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Wake on LAN prep for later Legion-assisted scraping.
      # Keep this disabled until the Legion endpoint, MAC address, and sleep command are confirmed.
      #
      # - name: Wake Legion
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y wakeonlan
      #     wakeonlan "${{ secrets.LEGION_MAC_ADDRESS }}"
      #     sleep 60
      #
      # - name: Put Legion to sleep
      #   if: always()
      #   run: |
      #     curl -X POST "${{ secrets.LEGION_SLEEP_WEBHOOK }}"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run scraper
        run: pnpm --filter @sentinel-market/scraper scrape:once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_MIN_SCORE: ${{ vars.SCRAPER_MIN_SCORE || '72' }}
          EBAY_API_KEY: ${{ secrets.EBAY_API_KEY }}
          NEWEGG_API_KEY: ${{ secrets.NEWEGG_API_KEY }}
          CJ_ACCESS_TOKEN: ${{ secrets.CJ_ACCESS_TOKEN }}
          BACK_MARKET_API_KEY: ${{ secrets.BACK_MARKET_API_KEY }}
